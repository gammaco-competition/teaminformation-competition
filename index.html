<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { background-color: #f8f9fa; padding: 20px 10px; font-family: 'Prompt', sans-serif; }
    .main-card { max-width: 800px; width: 100%; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .form-label { font-weight: 600; color: #495057; font-size: 0.85rem; }
    .hidden { display: none; }
    .loading { color: #1a237e; font-style: italic; }
    .banner-container { width: 100%; overflow: hidden; border-radius: 10px; margin-bottom: 20px; }
    .banner-img { width: 100%; height: auto; display: block; object-fit: cover; }
    .btn-save-custom { background-color: #1a237e !important; color: white !important; }
    @media (max-width: 576px) { .main-card { border-radius: 0; box-shadow: none; } }
  </style>
</head>

<body>
  <div class="main-card">
    <div class="banner-container">
      <img src="https://img1.pic.in.th/images/unnamed8637e85ce4068c4b.jpg" alt="Banner" class="banner-img">
    </div>

    <div id="loginSection" class="container-fluid px-0">
      <div class="mb-3">
        <label class="form-label">Your Email (อีเมลของคุณ)</label>
        <input type="email" id="email" class="form-control form-control-lg" placeholder="example@mail.com">
      </div>
      <button onclick="login()" id="loginBtn" class="btn btn-primary w-100">Confirm</button>
    </div>

    <div id="selectSection" class="hidden container-fluid px-0">
      <div class="mb-3">
        <label class="form-label">Choose Team ID</label>
        <select id="teamDropdown" class="form-select form-select-lg" onchange="loadTeamData()">
          <option value="">-- Choose your Team ID --</option>
        </select>
      </div>
    </div>

    <div id="editSection" class="hidden">
      <hr>
      <div id="formFields" class="row g-2 g-md-3"></div>
      <div class="mt-4">
        <button onclick="saveChanges()" id="saveBtn" class="btn btn-save-custom w-100">Save</button>
      </div>
    </div>

    <div id="status" class="mt-3 text-center loading hidden">
      <div class="spinner-border spinner-border-sm text-primary" role="status"></div> Processing...
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwBe2lR3v1nTxVsKU2AJxMnmyL9q8diUPx9eHm4LTpCAFvNry8JhKysBPJ2DPkyzGFL/exec"; // ** วาง URL ที่ได้จากขั้นตอนการ Deploy **
    let currentTeamId = "";

    function showStatus(show) { document.getElementById('status').classList.toggle('hidden', !show); }

    function handleFailure(error) {
      showStatus(false);
      Swal.fire({ icon: 'error', title: 'Error', text: 'การเชื่อมต่อผิดพลาด: ' + error });
    }

    // ฟังก์ชันส่งข้อมูลไปยัง GAS (ใช้ POST)
    async function callGAS(data) {
      const response = await fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify(data)
      });
      return await response.json();
    }

    function login() {
      const email = document.getElementById('email').value;
      if (!email) return alert("กรุณากรอกอีเมล");
      showStatus(true);

      callGAS({ action: "getTeamsByEmail", email: email })
        .then(res => {
          showStatus(false);
          if (res.error) return Swal.fire('ไม่พบข้อมูล', res.error, 'warning');
          
          const select = document.getElementById('teamDropdown');
          select.innerHTML = '<option value="">-- เลือก Team ID --</option>';
          res.teams.forEach(id => { select.innerHTML += `<option value="${id}">${id}</option>`; });
          
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('selectSection').classList.remove('hidden');
        })
        .catch(handleFailure);
    }

    function loadTeamData() {
      currentTeamId = document.getElementById('teamDropdown').value;
      if (!currentTeamId) return;
      document.getElementById('formFields').innerHTML = '<div class="text-center w-100 p-5"><div class="spinner-border text-primary"></div></div>';
      document.getElementById('editSection').classList.remove('hidden');

      callGAS({ action: "getTeamData", teamId: currentTeamId })
        .then(fields => {
          if (!fields) return;
          renderForm(fields);
        })
        .catch(handleFailure);
    }

    function renderForm(fields) {
      const container = document.getElementById('formFields');
      container.innerHTML = "";
      fields.forEach(item => {
        const col = document.createElement('div');
        col.className = 'col-md-6 mb-3';
        col.innerHTML = `
          <label class="form-label">${item.label}</label>
          <input type="text" class="form-control team-input" data-col="${item.colIndex}" value="${item.value}">
        `;
        container.appendChild(col);
      });
    }

    function saveChanges() {
      const inputs = document.querySelectorAll('.team-input');
      const updatedData = Array.from(inputs).map(input => ({
        colIndex: input.dataset.col,
        value: input.value
      }));

      Swal.fire({
        title: 'ยืนยันการบันทึก?',
        showCancelButton: true,
        confirmButtonText: 'บันทึก',
        preConfirm: () => {
          return callGAS({ 
            action: "updateData", 
            teamId: currentTeamId, 
            updatedData: updatedData 
          });
        }
      }).then((result) => {
        if (result.value && !result.value.error) {
          Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
        }
      });
    }
  </script>
</body>
</html>
